name: "Copilot Setup Steps"

# Run automatically when this file changes, and allow manual runs from the Actions tab.
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # Must be named exactly `copilot-setup-steps` to be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Pre-install GitHub Copilot CLI
              # Install the gh copilot extension and accept the
              # "Would you like to install GitHub Copilot? [Y/n]" prompt
              # non-interactively so the binary is baked in before the agent starts.
              run: |
                  gh extension install github/gh-copilot 2>/dev/null || true
                  printf 'y\n' | gh copilot version
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
